services:

  backend:

    build: ./backend

    ports:
      - "4000:4000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

  frontend:

    build: ./frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongoo:
    image: mongo:latest
    ports:
      - "27017:27017"
    

    depends_on:
      - backend